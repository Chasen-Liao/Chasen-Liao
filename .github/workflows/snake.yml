name: 🐍 Generate Snake Animation

on:
  schedule:
    # 每天 UTC 00:00 自动运行
    - cron: "0 0 * * *"
  workflow_dispatch: # 允许手动触发

jobs:
  generate:
    name: Generate Snake SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23DB2777&color_dots=%23FFF1F2,%23FBCFE8,%23F9A8D4,%23F472B6,%23DB2777
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23F9A8D4&color_dots=%23301A2C,%234B273F,%239D174D,%23DB2777,%23F9A8D4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake SVG to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
