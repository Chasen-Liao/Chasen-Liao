<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">AI tooling and context systems</title>
  <desc id="desc">A calm pink signal graphic with a small amount of motion.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17121a" />
      <stop offset="1" stop-color="#0f1117" />
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f9a8d4" />
      <stop offset="1" stop-color="#f472b6" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#3b2537" stroke-width="1" />
      <circle cx="0" cy="0" r="1" fill="#f9a8d4" opacity="0.14" />
    </pattern>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <clipPath id="screen"><rect x="8" y="8" width="1184" height="204" rx="22" /></clipPath>
  </defs>
  <style>
    text { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .flow { stroke-dasharray: 8 10; animation: flow 12s linear infinite; }
    .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 4.8s ease-in-out infinite; }
    @keyframes flow { to { stroke-dashoffset: -72; } }
    @keyframes pulse { 0%, 100% { transform: scale(.96); opacity: .72; } 50% { transform: scale(1.04); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <rect x="8" y="8" width="1184" height="204" rx="22" fill="url(#surface)" stroke="#f472b6" stroke-opacity="0.75" stroke-width="2" />
  <g clip-path="url(#screen)">
    <rect x="8" y="8" width="1184" height="204" fill="url(#grid)" opacity="0.5" />
    <circle cx="1038" cy="116" r="96" fill="#db2777" opacity="0.2" filter="url(#blur)" />
  </g>
  <line x1="8" y1="52" x2="1192" y2="52" stroke="#4b273f" />
  <circle cx="38" cy="30" r="4" fill="#f472b6" />
  <circle cx="54" cy="30" r="4" fill="#fbbf24" />
  <circle cx="70" cy="30" r="4" fill="#34d399" />
  <text x="92" y="34" fill="#f9a8d4" font-size="12" letter-spacing="2">CHASEN / BUILD_SYSTEM</text>
  <text x="1110" y="34" fill="#d1d5db" font-size="11" letter-spacing="1.2" text-anchor="end">AI TOOLING</text>
  <path d="M62 92H250" stroke="url(#pink)" stroke-width="5" stroke-linecap="round" />
  <circle cx="62" cy="92" r="7" fill="#f9a8d4" />
  <text x="62" y="137" fill="#fff1f2" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700" letter-spacing="-0.6">USEFUL SYSTEMS, CAREFULLY BUILT</text>
  <text x="62" y="170" fill="#e5e7eb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" letter-spacing="2.2">CONTEXT SYSTEMS · DEVELOPER EXPERIENCES</text>
  <path d="M756 102H884M884 102 944 124M884 102 944 80" fill="none" stroke="#f472b6" stroke-width="1.3" opacity="0.6" class="flow" />
  <g transform="translate(1038 116)">
    <circle r="78" fill="none" stroke="#4b273f" stroke-width="1" />
    <circle r="56" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.5" stroke-dasharray="9 12" class="flow" />
    <circle r="38" fill="#9d174d" opacity="0.72" class="pulse" />
    <circle r="15" fill="#17121a" stroke="#f9a8d4" stroke-width="1.5" filter="url(#glow)" />
    <circle r="4" fill="#fff1f2" filter="url(#glow)" />
  </g>
  <text x="62" y="198" fill="#f9a8d4" font-size="10" letter-spacing="2.5">SIGNAL: STEADY</text>
</svg>
